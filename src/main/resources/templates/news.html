<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Universal Buzz</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/events.css}">
    <link rel="stylesheet" th:href="@{/css/news.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="dashboard-layout">
    <div th:replace="fragments/sidebar :: sidebar('news')"></div>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>Campus News</h1>
                <p>Read recent stories from around campus.</p>
            </div>
        </header>

        <section class="news-grid">
            <a class="news-card" th:each="news : ${newsList}" th:href="@{'/news/' + ${news.id}}">
                <img class="news-card-image" th:src="${news.imageUrl}" alt="News image">
                <div class="news-card-body">
                    <h2 th:text="${news.title}">News title</h2>
                    <p class="meta">
                        <span th:text="${#temporals.format(news.publishDate, 'MMM d, yyyy')}">Date</span>
                        <span th:if="${news.author != null and !#strings.isEmpty(news.author)}">
                            • <span th:text="${news.author}">Author</span>
                        </span>
                    </p>
                    <p class="summary" th:text="${news.summary}">Summary text</p>
                </div>
            </a>
        </section>
    </main>
</div>

<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
