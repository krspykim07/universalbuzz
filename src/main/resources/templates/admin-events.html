<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Events | Universal Buzz</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/events.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard-layout">
        <div th:replace="fragments/sidebar :: sidebar('admin-events')"></div>

        <main class="main-content">
            <header class="topbar topbar-row">
                <div>
                    <h1>Manage Events</h1>
                    <p>Add and review event postings.</p>
                </div>

                <a href="/admin/events/new" class="action-btn">+ Add Event</a>
            </header>

            <section class="events-grid">
                <div class="event-card" th:each="event : ${events}">
                    <h2 th:text="${event.title}">Event Title</h2>

                    <p class="meta">
                        <span th:text="${#temporals.format(event.startTime, 'MMM d, yyyy')}">Date</span>
                        •
                        <span th:text="${#temporals.format(event.startTime, 'h:mm a')}">Start</span>
                        -
                        <span th:text="${#temporals.format(event.endTime, 'h:mm a')}">End</span>
                        •
                        <span th:text="${event.location}">Location</span>
                    </p>

                    <p class="description" th:text="${event.description}">Description</p>

                    <p class="meta">
                        Organizer: <span th:text="${event.organizerName}">Organizer</span>
                    </p>

                    <p class="meta">
                        Status: <strong th:text="${event.status}">DRAFT</strong>
                    </p>

                    <div class="event-actions">
                        <a th:href="@{'/admin/events/edit/' + ${event.id}}" class="secondary-btn">
                            Edit
                        </a>

                        <form th:if="${event.status.name() == 'DRAFT'}"
                            th:action="@{'/admin/events/publish/' + ${event.id}}"
                            method="post"
                            class="inline-form">
                            <button type="submit" class="primary-btn">Publish</button>
                        </form>

                        <form th:if="${event.status.name() == 'PUBLISHED'}"
                            th:action="@{'/admin/events/unpublish/' + ${event.id}}"
                            method="post"
                            class="inline-form">
                            <button type="submit" class="secondary-btn">Unpublish</button>
                        </form>

                        <form th:action="@{'/admin/events/delete/' + ${event.id}}"
                            method="post"
                            class="inline-form">
                            <button type="submit" class="danger-btn">Delete</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
