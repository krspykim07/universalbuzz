<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Buzz Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard-layout">

        <div th:replace="fragments/sidebar :: sidebar('dashboard')"></div>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Welcome Back</h1>
                    <p>Your international student dashboard</p>
                </div>
            </header>

            <section class="cards">
                <div class="card">
                    <h3>Resources</h3>
                    <p>Access school resources and support services.</p>
                    <button>View Resources</button>
                </div>

                <div class="card">
                    <h3>Announcements</h3>
                    <p>Stay updated with important school notices.</p>
                    <button>View Updates</button>
                </div>
            </section>

            <section class="recent-section">
                <div class="section-header">
                    <h2>Upcoming Events</h2>
                    <a href="/events" class="view-all-btn">View All Events</a>
                </div>

                <div class="update-list">
                    <div class="update-card" th:each="event : ${topEvents}">
                        <h4 th:text="${event.title}">Event Title</h4>
                        <p>
                            <span th:text="${#temporals.format(event.eventDate, 'MMM d, yyyy')}">Date</span>
                            <span th:if="${event.eventTime != null and !#strings.isEmpty(event.eventTime)}">
                                • <span th:text="${event.eventTime}">Time</span>
                            </span>
                        </p>
                        <p th:text="${event.location}">Location</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script th:src="@{/js/sidebar.js}"></script>
    
</body>
</html>
