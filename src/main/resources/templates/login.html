<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Buzz - Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="brand-box">
                <h1>Universal Buzz</h1>
                <p>
                    A student platform for international students to stay updated
                    with campus events, school announcements, and helpful resources.
                </p>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Login to continue</p>

                <div th:if="${param.error}" class="message error">
                    Invalid username or password.
                </div>

                <div th:if="${param.logout}" class="message success">
                    You have been logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <div class="footer-text">
                    <p>International Student Support Portal</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
