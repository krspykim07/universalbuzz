<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Universal Buzz</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/events.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard-layout">

        <div th:replace="fragments/sidebar :: sidebar('events')"></div>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Campus Events</h1>
                    <p>Browse monthly events with a calendar and a date-ordered list.</p>
                </div>
            </header>

            <section class="panel highlights-panel" aria-labelledby="highlights-title">
                <div class="panel-header">
                    <div>
                        <h2 id="highlights-title">Top events this month</h2>
                        <p id="month-label">Loading month…</p>
                    </div>
                </div>

                <div id="highlights-grid" class="events-grid events-carousel"></div>
                <p id="highlights-empty" class="empty-state" hidden>No events in this month yet.</p>
            </section>

            <section class="calendar-layout">
                <div class="panel calendar-panel" aria-labelledby="calendar-title">
                    <div class="calendar-header-row">
                        <h2 id="calendar-title">Monthly Calendar</h2>
                        <div class="calendar-controls">
                            <button id="prev-month" class="icon-btn" type="button" aria-label="Previous month">←</button>
                            <button id="next-month" class="icon-btn" type="button" aria-label="Next month">→</button>
                        </div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid"></div>
                </div>

                <div class="panel list-panel" aria-labelledby="list-title">
                    <h2 id="list-title">Events by date</h2>
                    <ul id="month-events-list" class="month-events-list"></ul>
                    <p id="month-list-empty" class="empty-state" hidden>No events scheduled for this month.</p>
                </div>
            </section>
        </main>
    </div>

    <script th:src="@{/js/sidebar.js}"></script>
    <script th:inline="javascript">
        window.allEvents = /*[[${events}]]*/ [];
    </script>
    <script th:src="@{/js/events-calendar.js}"></script>
</body>
</html>
