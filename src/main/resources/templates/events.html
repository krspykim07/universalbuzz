<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Universal Buzz</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/events.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard-layout">

        <div th:replace="fragments/sidebar :: sidebar('events')"></div>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Campus Events</h1>
                    <p>Stay updated with upcoming activities and student programs.</p>
                </div>
            </header>

            <section class="events-grid">
                <div class="event-card" th:each="event : ${events}">
                    <h2 th:text="${event.title}">Event Title</h2>
                    <p class="meta">
                        <span th:text="${#temporals.format(event.eventDate, 'MMM d, yyyy')}">Date</span>
                        <span th:if="${event.eventTime != null and !#strings.isEmpty(event.eventTime)}">
                            • <span th:text="${event.eventTime}">Time</span>
                        </span>
                        •
                        <span th:text="${event.location}">Location</span>
                    </p>
                    <div class="description-wrap">
                        <p class="description" th:text="${event.description}">Description</p>
                        <div class="description-popup" th:text="${event.description}">Full description</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
