<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formMode == 'edit'} ? 'Edit Event | Universal Buzz' : 'New Event | Universal Buzz'">New Event | Universal Buzz</title>
    <link rel="stylesheet" th:href="@{/css/events.css}">
</head>
<body>
    <div class="page form-page">
        <div class="form-card">
            <h1 th:text="${formMode == 'edit'} ? 'Edit Event' : 'Add Event'">Add Event</h1>
            <p th:text="${formMode == 'edit'} ? 'Update the event details below.' : 'Create a new campus event for students to view.'">
                Create a new campus event for students to view.
            </p>

            <form th:action="${formMode == 'edit'} ? @{'/admin/events/update/' + ${event.id}} : @{/admin/events}" method="post" th:object="${event}">
                <label>Title</label>
                <input type="text" th:field="*{title}" placeholder="Enter event title" required>

                <label>Start Time</label>
                <input type="datetime-local" th:field="*{startTime}" required>

                <label>End Time</label>
                <input type="datetime-local" th:field="*{endTime}" required>

                <label>Location</label>
                <input type="text" th:field="*{location}" placeholder="Student Union" required>

                <label>Organizer</label>
                <input type="text" th:field="*{organizerName}" placeholder="Club or organization name" required>
                
                <label>Thumbnail Image URL</label>
                <input type="text" th:field="*{imageUrl}" placeholder="https://example.com/event-image.jpg">

                <label>Description</label>
                <textarea 
                    th:field="*{description}" 
                    rows="6" 
                    maxlength="500"
                    placeholder="Write an event description (max 500 characters)"
                    required>
                </textarea>
                <small id="charCount">0 / 500</small>

                <label>Status</label>
                <select th:field="*{status}">
                    <option value="DRAFT">Draft</option>
                    <option value="PUBLISHED">Published</option>
                </select>

                <div class="form-actions">
                    <a href="/admin/events" class="secondary-btn">Cancel</a>
                    <button type="submit" class="primary-btn" th:text="${formMode == 'edit'} ? 'Update Event' : 'Save Event'">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const textarea = document.querySelector("textarea");
        const counter = document.getElementById("charCount");

        function updateCount() {
            counter.textContent = textarea.value.length + " / 500";
        }

        textarea.addEventListener("input", updateCount);
        updateCount();
    </script>
    
</body>
</html>
